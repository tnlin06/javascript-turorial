<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>

  <style>
    button {
      width: 25px;
    }
  </style>
</head>
<body>
  <p>
    <button onclick="
      calculation += '1';
      console.log(calculation);
      ">1</button>
    <button onclick="
      calculation += '2';
      console.log(calculation);
      ">2</button>
    <button onclick="
      calculation += '3';
      console.log(calculation);
      ">3</button>
    <button onclick="
      calculation += ' + ';
      console.log(calculation);
      ">+</button>
  </p>
  <p>
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button onclick="
      calculation += ' - ';
      console.log(calculation);
      ">-</button>
  </p>
  <p>
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button onclick="
      calculation += ' * ';
      console.log(calculation);
      ">*</button>
  </p>
  <p>
    <button>0</button>
    <button>.</button>
    <button onclick="
      calculation = eval(calculation);
      console.log(typeof calculation);
      console.log(calculation);
    ">=</button>
    <button onclick="
      calculation += ' / ';
      console.log(calculation);
      ">/</button>
  </p>
  <button style="width: auto;" onclick="
    calculation = '';
    console.log('Cleared');
  ">Clear</button>
  
  <script>
    let calculation = '';
  </script>
</body>

</html>
